const BG_TILE = 2000;
const BG_PER_TILE = 120;
const BG_TILE_CACHE_MAX = 256;
const bgTileCache = new Map();

function getBgTile(tx, ty) {
  const key = `${tx},${ty}`;
  if (bgTileCache.has(key)) {
    const entry = bgTileCache.get(key);
    bgTileCache.delete(key);
    bgTileCache.set(key, entry);
    return entry;
  }
  const seed = tx * 73856093 ^ ty * 19349663;
  const stars = Array.from({ length: BG_PER_TILE }, (_, i) => {
    const s1 = Math.sin((seed + i * 127.1)) * 43758.5453;
    const s2 = Math.sin((seed + i * 311.7)) * 43758.5453;
    const s3 = Math.sin((seed + i * 91.3))  * 43758.5453;
    const s4 = Math.sin((seed + i * 53.1))  * 43758.5453;
    const s5 = Math.sin((seed + i * 17.3))  * 43758.5453;
    return {
      x: (s1 - Math.floor(s1)) * BG_TILE,
      y: (s2 - Math.floor(s2)) * BG_TILE,
      r: 0.3 + (s3 - Math.floor(s3)) * 1.2,
      a: 0.2 + (s4 - Math.floor(s4)) * 0.65,
      tw: (s5 - Math.floor(s5)) * Math.PI * 2,
    };
  });
  if (bgTileCache.size >= BG_TILE_CACHE_MAX) {
    bgTileCache.delete(bgTileCache.keys().next().value);
  }
  bgTileCache.set(key, stars);
  return stars;
}

  try {

    if(!unlocked.includes(id)) {
      unlocked.push(id);
      localStorage.setItem(ACHIEVEMENT_STORAGE_KEY, JSON.stringify(unlocked));
      unlockedSessionCache.add(id);
      
      const target = MILESTONE_REGISTRY.find(m => m.id === id);
      if(target) {
        const toastNode = document.getElementById('ach-toast');
        document.getElementById('ach-toast-name').textContent = target.name;
        toastNode.classList.add('show');
        setTimeout(() => { toastNode.classList.remove('show'); }, 4000);
      }
    } else {
      unlockedSessionCache.add(id);
    }
  } catch(e) { console.error("Milestone tracking pipeline fail:", e); }
}

function toggleOverlay(id, open = true) {
  const panel = document.getElementById(`overlay-${id}`);
  if(open) panel.classList.add('open');
  else panel.classList.remove('open');
}

function getLocalSaves() {
  try {
    const raw = localStorage.getItem(LOCAL_STORAGE_SAVEDB_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) {
    console.error("Local storage lookup corruption protection:", e);
    return [];
  }
}

function saveHorizonToLocalStorage(explicitName = null) {
  try {
    let saves = getLocalSaves();
    
    let saveName = currentActiveSkyName;
    
    const contextPayload = {
      id: currentActiveSkyId || Date.now().toString(),
      name: saveName,
      timestamp: new Date().toLocaleString(),
      stars: myStars,
      lines: myLines,
      constellations: constellations,
      cam: { x: cam.x, y: cam.y, zoom: cam.zoom }
    };
    
    const uniqueIndex = saves.findIndex(item => item.id === contextPayload.id);
    if(uniqueIndex !== -1) {
      saves[uniqueIndex] = contextPayload;
    } else {
      saves.unshift(contextPayload);
    }
    
    localStorage.setItem(LOCAL_STORAGE_SAVEDB_KEY, JSON.stringify(saves));
    currentActiveSkyId = contextPayload.id;
    currentActiveSkyName = contextPayload.name;
    
    analyticsRegistry.totalSavesExecuted++;
    updateSystemAnalytics();
    triggerMilestoneUnlock('horizon_saved');
    
    hasUnsavedChanges = false;
    toast(`"${saveName}" saved`);
  } catch(e) {
    toast("failed");
    console.error(e);
  }
}

function processLocalDatabaseRender() {
  const container = document.getElementById('save-list');
  container.innerHTML = "";
  const universes = getLocalSaves();
  
  if(universes.length === 0) {
    container.innerHTML = `<div class="empty-saves">No skies found in system memory.</div>`;
    return;
  }
  
  universes.forEach(uni => {
    const row = document.createElement('li');
    row.className = "save-item";
    row.innerHTML = `
      <div class="save-info">
        <div class="save-name">${uni.name}</div>
        <div class="save-meta">Timestamp: ${uni.timestamp} | Nodes: ${uni.stars ? uni.stars.length : 0}</div>
      </div>
      <div class="save-actions">
        <button class="sa-btn action-load-trigger">Load</button>
        <button class="sa-btn red action-purge-trigger">Delete</button>
      </div>
    `;
    
    row.querySelector('.action-load-trigger').onclick = () => {
      myStars = uni.stars || [];
      myLines = uni.lines || [];
      constellations = uni.constellations || [];
      cam.x = uni.cam ? uni.cam.x : 0;
      cam.y = uni.cam ? uni.cam.y : 0;
      cam.zoom = uni.cam ? uni.cam.zoom : 1;
      
      currentActiveSkyId = uni.id;
      currentActiveSkyName = uni.name;
      toggleOverlay('load', false);
      launchSystemHorizonView(false);
    };
    
    row.querySelector('.action-purge-trigger').onclick = (e) => {
      e.stopPropagation();
      if(confirm(`Delete sky "${uni.name}" permanently?`)) {
        let updated = getLocalSaves().filter(t => t.id !== uni.id);
        localStorage.setItem(LOCAL_STORAGE_SAVEDB_KEY, JSON.stringify(updated));
        if(currentActiveSkyId === uni.id) currentActiveSkyId = null;
        processLocalDatabaseRender();
      }
    };
    
    container.appendChild(row);
  });
}

function triggerSystemJSONExport() {
  try {
    const payload = {
      formatId: "sharedsky_matrix_export",
      name: currentActiveSkyName,
      stars: myStars,
      lines: myLines,
      constellations: constellations
    };
    const stringified = JSON.stringify(payload, null, 2);
    const blob = new Blob([stringified], { type: "application/json" });
    const virtualAnchor = document.createElement('a');
    virtualAnchor.href = URL.createObjectURL(blob);
    virtualAnchor.download = `${currentActiveSkyName.toLowerCase().replace(/\s+/g, '_')}_export.json`;
    virtualAnchor.click();
    triggerMilestoneUnlock('data_transmission');
  } catch(e) { console.error("Export fault:", e); }
}

function constructMenuStarfield() {
  menuCanvas.width = window.innerWidth;
  menuCanvas.height = window.innerHeight;
  menuStars = Array.from({ length: 180 }, () => ({
    x: Math.random() * menuCanvas.width,
    y: Math.random() * menuCanvas.height,
    r: Math.random() * 1.5 + 0.2,
    alpha: Math.random(),
    frequency: (Math.random() - 0.5) * 0.01
  }));
}

function processMenuStarfieldLoop() {
  if (!isMenuLoopRunning) return;
  mctx.clearRect(0, 0, menuCanvas.width, menuCanvas.height);
  mctx.fillStyle = '#06060f';
  mctx.fillRect(0, 0, menuCanvas.width, menuCanvas.height);
  
  menuStars.forEach(s => {
    s.alpha += s.frequency;
    if (s.alpha <= 0 || s.alpha >= 1) s.frequency *= -1;
    mctx.save();
    mctx.globalAlpha = Math.max(0.05, Math.min(1, s.alpha));
    mctx.fillStyle = '#e8e0d5';
    mctx.beginPath();
    mctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    mctx.fill();
    mctx.restore();
  });
  requestAnimationFrame(processMenuStarfieldLoop);
}

function launchSystemHorizonView(multiplayer = false) {

  isMultiplayerMode = multiplayer;
  hasUnsavedChanges = false;

async function loadAll() {
  if (!db) return [];
  
  let allData = [];
  let from = 0;
  const step = 1000;
  let keepFetching = true;

  while (keepFetching) {
    const to = from + step - 1;
    const { data, error } = await db.from('constellations')
      .select('*')
      .order('created_at', { ascending: true }) 
      .range(from, to);
    
    if (error) throw new Error(error.message);
    
    if (data && data.length > 0) {
      allData = allData.concat(data);
      if (data.length < step) {
        keepFetching = false; 
      } else {
        from += step; 
      }
    } else {
      keepFetching = false;
    }
  }
  
  return allData;
}

async function insertOne(record) {
  const { data, error } = await db.from('constellations').insert([record]).select().single();
  if (error) throw error;
  return data;
}

let latestSeenAt = null;
let pollInFlight = false;

async function pollForNew() {
  if (!db) return; 
  
  if (!isMultiplayerMode || pollInFlight) {
    setTimeout(pollForNew, 4000);
    return;
  }
  
  pollInFlight = true;
  try {
    let q = db.from('constellations').select('*').order('created_at', { ascending: true });
    if (latestSeenAt) q = q.gt('created_at', latestSeenAt);
    
    const { data, error } = await q;
    if (error) throw error;
    
    if (data && data.length > 0) {
      let added = 0;
      data.forEach(row => {
        if (!constellations.some(c => c.id === row.id)) {
          constellations.push(migrateConstellation(row)); 
          latestSeenAt = row.created_at;
          added++;
        }
      });
      if (added > 0) { 
        updateCount(); 
        toast(`✦ ${added} new constellation${added > 1 ? 's' : ''} aligned`); 
      }
    }
  } catch(e) { 
    console.warn('Polling failure exception handled:', e.message); 
  }
  
  pollInFlight = false;
  setTimeout(pollForNew, 4000);
}

async function connectDatabaseNetworkLayer() {
  if (!db) return;
  showSyncing(true);
  try {
    const raw = await loadAll();
    constellations = raw.map(migrateConstellation);
    if (constellations.length > 0) latestSeenAt = constellations[constellations.length - 1].created_at;
    updateCount();
    
    if (!presenceChannel) {
      setupPresence(updateOnlineCount);
    }
  } catch(e) { console.error("Database stack hydration fault:", e); }
  showSyncing(false);
}

function disconnectDatabaseNetworkLayer() {
  if (presenceChannel) {
    presenceChannel.unsubscribe();
    presenceChannel = null;
  }
  latestSeenAt = null;
}

function drawStarShape(wx, wy, r, color, alpha, glow) {
  const { x, y } = worldToScreen(wx, wy);
  const sr = r * cam.zoom;
  if (sr < 0.3) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  if (glow > 0 && sr > 1) { ctx.shadowBlur = glow * Math.min(cam.zoom, 2); ctx.shadowColor = color; }
  ctx.beginPath(); ctx.arc(x, y, Math.max(sr, 0.5), 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
  ctx.restore();
}

function spawnShootingStar() {
  const topLeft = screenToWorld(0, 0);
  const bottomRight = screenToWorld(W, H);
  const startX = topLeft.x + Math.random() * (bottomRight.x - topLeft.x);
  const startY = topLeft.y + Math.random() * (bottomRight.y - topLeft.y) * 0.4;
  const angle = Math.PI * 0.25 + (Math.random() * 0.15 - 0.075);
  const speed = (25 + Math.random() * 20) / cam.zoom;

  shootingStars.push({
    x: startX,
    y: startY,
    dx: Math.cos(angle) * speed,
    dy: Math.sin(angle) * speed,
    length: (80 + Math.random() * 120),
    life: 1.0,
    decay: 0.015 + Math.random() * 0.02
  });
}

function translateClientPos(sx, sy) {
  const isForcedLandscape = window.innerWidth <= 768 && window.innerHeight > window.innerWidth;
  if (isForcedLandscape) return { sx: sy, sy: window.innerWidth - sx };
  return { sx, sy };
}

function updateAndDrawShootingStars() {
  if (Math.random() < 0.008) spawnShootingStar();

  shootingStars = shootingStars.filter(ss => {
    ss.life -= ss.decay;
    if (ss.life <= 0) return false;

    const p1 = worldToScreen(ss.x, ss.y);
    ss.x += ss.dx;
    ss.y += ss.dy;
    const p2 = worldToScreen(ss.x, ss.y);

    ctx.save();
    const grad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
    grad.addColorStop(0, 'rgba(255, 255, 255, 0)');
    grad.addColorStop(0.9, `rgba(200, 225, 255, ${ss.life * 0.6})`);
    grad.addColorStop(1, `rgba(255, 255, 255, ${ss.life * 0.9})`);
    
    ctx.strokeStyle = grad;
    ctx.lineWidth = Math.max(0.5, 1.5 * cam.zoom * ss.life);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
    ctx.restore();

    return true;
  });
}

function render() {
  if (isMenuLoopRunning) return;
  ctx.clearRect(0, 0, W, H);

  const g = ctx.createRadialGradient(W * 0.4, H * 0.3, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.8);
  g.addColorStop(0, '#0d0d24'); g.addColorStop(1, '#06060f');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  const topLeft     = screenToWorld(0, 0);
  const bottomRight = screenToWorld(W, H);
  const tx0 = Math.floor(topLeft.x / BG_TILE) - 1;
  const tx1 = Math.ceil(bottomRight.x / BG_TILE) + 1;
  const ty0 = Math.floor(topLeft.y / BG_TILE) - 1;
  const ty1 = Math.ceil(bottomRight.y / BG_TILE) + 1;

  for (let tx = tx0; tx <= tx1; tx++) {
    for (let ty = ty0; ty <= ty1; ty++) {
      const tile = getBgTile(tx, ty);
      tile.forEach(s => {
        const wx = tx * BG_TILE + s.x;
        const wy = ty * BG_TILE + s.y;
        const tw = 0.85 + Math.sin(tick * 0.012 + s.tw) * 0.15;
        drawStarShape(wx, wy, s.r, '#fff', s.a * tw, 0);
      });
    }
  }

  updateAndDrawShootingStars();

  constellations.forEach(c => {
    const stars = c.stars || [];
    const lines = c.lines || [];

    ctx.save();
    ctx.strokeStyle = c.color + '50';
    ctx.lineWidth = 0.8;
    lines.forEach(([a, b]) => {
      const sa = stars[a];
      const sb = stars[b];
      if (!sa || !sb) return;
      const pa = worldToScreen(sa.x, sa.y);
      const pb = worldToScreen(sb.x, sb.y);
      ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.stroke();
    });
    ctx.restore();

    stars.forEach(s => drawStarShape(s.x, s.y, s.r, c.color, 0.8, 6));

    if (c.name && stars.length > 0 && cam.zoom > 0.3) {
      const screenStars = stars.map(s => worldToScreen(s.x, s.y));
      const cx = screenStars.reduce((sum, s) => sum + s.x, 0) / screenStars.length;
      const cy = Math.min(...screenStars.map(s => s.y)) - 14;
      ctx.save();
      ctx.font = '400 10px "Cinzel",serif';
      ctx.fillStyle = c.color + '90';
      ctx.textAlign = 'center';
      ctx.globalAlpha = Math.min(1, (cam.zoom - 0.3) * 3);
      ctx.fillText(c.name.toUpperCase(), cx, cy);
      ctx.restore();
    }
  });

  myLines.forEach(([a, b]) => {
    const sa = myStars[a];
    const sb = myStars[b];
    if (!sa || !sb) return;
    const pa = worldToScreen(sa.x, sa.y);
    const pb = worldToScreen(sb.x, sb.y);
    ctx.save(); 
    if (drawMode === 'erase') {
      ctx.strokeStyle = '#ff7070'; ctx.lineWidth = 1.2; ctx.globalAlpha = 0.4;
    } else {
      ctx.strokeStyle = '#7eb8ff'; ctx.lineWidth = 0.9; ctx.globalAlpha = 0.6; ctx.setLineDash([4, 4]);
    }
    ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.stroke();
    ctx.restore();
  });

  if (lineStart !== null && drawMode === 'line') {
    const originStar = myStars[lineStart];
    if (originStar) {
      const pa = worldToScreen(originStar.x, originStar.y);
      let targetX = currentMousePos.sx;
      let targetY = currentMousePos.sy;

      if (hoveredStar !== null && hoveredStar !== lineStart && myStars[hoveredStar]) {
        const snapStar = worldToScreen(myStars[hoveredStar].x, myStars[hoveredStar].y);
        targetX = snapStar.x;
        targetY = snapStar.y;
      }

      ctx.save();
      ctx.strokeStyle = '#7eb8ff';
      ctx.lineWidth = 0.9;
      ctx.globalAlpha = 0.6;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(targetX, targetY);
      ctx.stroke();
      ctx.restore();
    } else {
      lineStart = null;
    }
  }

  myStars.forEach((s, i) => {
    const h = hoveredStar === i, st = lineStart === i;
    const p = st ? (0.7 + Math.sin(tick * 0.08) * 0.3) : 1;
    const color = drawMode === 'erase' && h ? '#ff7070' : '#7eb8ff';
    drawStarShape(s.x, s.y, s.r + (h ? 2 : 0), color, (st ? 1 : 0.88) * p, h || st ? 18 : 10);
    if (st) {
      const { x, y } = worldToScreen(s.x, s.y);
      ctx.save(); ctx.beginPath();
      const breathingRadius = Math.max(0.1, (s.r + 6) * cam.zoom + Math.sin(tick * 0.08) * 3);
      ctx.arc(x, y, breathingRadius, 0, Math.PI * 2);
      ctx.strokeStyle = '#7eb8ff'; ctx.globalAlpha = 0.25; ctx.lineWidth = 0.5; ctx.stroke();
      ctx.restore();
    }
  });

  tick++;
  requestAnimationFrame(render);
}

function setDrawMode(m) {
  drawMode = m; lineStart = null; dragStartStarIdx = -1;
  document.getElementById('btn-star').className = 'tbtn' + (m === 'star' ? ' active' : '');
  document.getElementById('btn-line').className = 'tbtn' + (m === 'line' ? ' active' : '');
  document.getElementById('btn-erase').className = 'tbtn' + (m === 'erase' ? ' active' : '');
  
  canvas.style.cursor = m === 'erase' ? 'cell' : 'crosshair';

  document.getElementById('hint').textContent = {
    star: 'click to place a star',
    line: 'click or drag between two stars to connect them',
    erase: 'click a star or line to remove it (you can only erase unsaved stars and lines)',
  }[m];
}

function clientPos(e) {
  const r = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return translateClientPos(cx - r.left, cy - r.top);
}

function nearestWorldStar(wx, wy, stars, threshPx = 20) {
  const thresh = threshPx / cam.zoom;
  let best = -1, bd = Infinity;
  stars.forEach((s, i) => {
    const d = Math.hypot(s.x - wx, s.y - wy);
    if (d < thresh && d < bd) { bd = d; best = i; }
  });
  return best;
}

function getLineDistance(wx, wy, p1, p2) {
  const A = wx - p1.x;
  const B = wy - p1.y;
  const C = p2.x - p1.x;
  const D = p2.y - p1.y;

  const dot = A * C + B * D;
  const lenSq = C * C + D * D;
  let param = -1;
  if (lenSq !== 0) param = dot / lenSq;

  let xx, yy;
  if (param < 0) {
    xx = p1.x; yy = p1.y;
  } else if (param > 1) {
    xx = p2.x; yy = p2.y;
  } else {
    xx = p1.x + param * C;
    yy = p1.y + param * D;
  }

  return Math.hypot(wx - xx, wy - yy);
}

function applyZoom(factor, pivotSx, pivotSy) {
  const newZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, cam.zoom * factor));
  if (newZoom === cam.zoom) return;
  const wx = (pivotSx - W / 2) / cam.zoom + cam.x;
  const wy = (pivotSy - H / 2) / cam.zoom + cam.y;
  cam.zoom = newZoom;
  cam.x = wx - (pivotSx - W / 2) / cam.zoom;
  cam.y = wy - (pivotSy - H / 2) / cam.zoom;
  triggerMilestoneUnlock('telescope_focus');
  showZoom();
}

function showZoom() {
  const el = document.getElementById('zoom-badge');
  el.textContent = Math.round(cam.zoom * 100) + '%';
  el.style.opacity = '1';
  clearTimeout(zoomBadgeTimer);
  zoomBadgeTimer = setTimeout(() => el.style.opacity = '0', 1200);
}

function recordLineConnection() {
  analyticsRegistry.sessionLinesDrawn++;
  analyticsRegistry.historicalTotalLinesDrawn++;
  updateSystemAnalytics();
  triggerMilestoneUnlock('deep_space_connection');
  if (analyticsRegistry.historicalTotalLinesDrawn >= 10) triggerMilestoneUnlock('network_init');
  if (analyticsRegistry.historicalTotalLinesDrawn >= 50) triggerMilestoneUnlock('weaver_of_light');
}

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const { sx, sy } = clientPos(e);
  if (e.ctrlKey || e.metaKey) {
    const factor = Math.exp(-e.deltaY * 0.01);
    applyZoom(factor, sx, sy);
  } else {
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    applyZoom(factor, sx, sy);
  }
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0 && e.button !== 1) return;
  const { sx, sy } = clientPos(e);
  const { x: wx, y: wy } = screenToWorld(sx, sy);
  
  isPanning = true;
  panStart = { sx, sy };
  camStart = { x: cam.x, y: cam.y };
  didPan = false;
  dragStartStarIdx = -1;

  if (drawMode === 'line') {
    const hit = nearestWorldStar(wx, wy, myStars);
    if (hit !== -1) {
      isPanning = false; 
      dragStartStarIdx = hit;
    }
  }
});

canvas.addEventListener('mousemove', e => {
  const { sx, sy } = clientPos(e);
  currentMousePos = { sx, sy };
  const { x: wx, y: wy } = screenToWorld(sx, sy);

  if (panStart) {
    if (Math.abs(sx - panStart.sx) > 4 || Math.abs(sy - panStart.sy) > 4) {
      didPan = true;
      triggerMilestoneUnlock('space_explorer');
      if (drawMode === 'line' && dragStartStarIdx !== -1 && lineStart === null) {
        lineStart = dragStartStarIdx;
      }
    }
    if (isPanning) {
      const dx = (sx - panStart.sx) / cam.zoom;
      const dy = (sy - panStart.sy) / cam.zoom;
      cam.x = camStart.x - dx;
      cam.y = camStart.y - dy;
      canvas.style.cursor = 'move';
      return;
    }
  }
  hoveredStar = nearestWorldStar(wx, wy, myStars);
});

canvas.addEventListener('mouseup', e => {
  const { sx, sy } = clientPos(e);
  const { x: wx, y: wy } = screenToWorld(sx, sy);
  canvas.style.cursor = drawMode === 'erase' ? 'cell' : 'crosshair';

  if (drawMode === 'line') {
    const hit = nearestWorldStar(wx, wy, myStars);
    if (didPan) {
      if (dragStartStarIdx !== -1 && hit !== -1 && dragStartStarIdx !== hit) {
        const dup = myLines.some(([a, b]) => (a === dragStartStarIdx && b === hit) || (a === hit && b === dragStartStarIdx));
        if (!dup) {
          myLines.push([dragStartStarIdx, hit]);
          recordLineConnection();
          hasUnsavedChanges = true;
        }
      }
      lineStart = null; 
    } else {
      if (hit !== -1) {
        if (lineStart === null) {
          lineStart = hit;
        } else if (lineStart === hit) {
          lineStart = null;
        } else {
          const dup = myLines.some(([a, b]) => (a === lineStart && b === hit) || (a === hit && b === lineStart));
          if (!dup) {
            myLines.push([lineStart, hit]);
            recordLineConnection();
            hasUnsavedChanges = true;
          }
          lineStart = null;
        }
      } else {
        lineStart = null;
      }
    }
    isPanning = false; panStart = null; dragStartStarIdx = -1;
    return;
  }

  if (isPanning && didPan) {
    isPanning = false; panStart = null;
    return; 
  }
  isPanning = false; panStart = null;
  handlePlace(sx, sy);
});

canvas.addEventListener('mouseleave', () => {
  isPanning = false; panStart = null; hoveredStar = null; dragStartStarIdx = -1;
  canvas.style.cursor = drawMode === 'erase' ? 'cell' : 'crosshair';
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    lastPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    isPanning = false;
  } else if (e.touches.length === 1) {
    const { sx, sy } = clientPos(e);
    currentMousePos = { sx, sy };
    const { x: wx, y: wy } = screenToWorld(sx, sy);

    isPanning = true; didPan = false; dragStartStarIdx = -1;
    touchStart = { sx, sy, camX: cam.x, camY: cam.y, t: Date.now() };
    panStart = { sx, sy };

    if (drawMode === 'line') {
      const hit = nearestWorldStar(wx, wy, myStars);
      if (hit !== -1) { isPanning = false; dragStartStarIdx = hit; }
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const boundingBox = canvas.getBoundingClientRect();
    const touchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - boundingBox.left;
    const touchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - boundingBox.top;
    const translatedMid = translateClientPos(touchMidX, touchMidY);
    if (lastPinchDist) applyZoom(dist / lastPinchDist, translatedMid.sx, translatedMid.sy);
    lastPinchDist = dist;
  } else if (e.touches.length === 1 && touchStart) {
    const { sx, sy } = clientPos(e);
    currentMousePos = { sx, sy };

    if (Math.abs(sx - touchStart.sx) > 5 || Math.abs(sy - touchStart.sy) > 5) {
      didPan = true;
      triggerMilestoneUnlock('space_explorer');
      if (drawMode === 'line' && dragStartStarIdx !== -1 && lineStart === null) {
        lineStart = dragStartStarIdx;
      }
    }

    if (isPanning) {
      const dx = (sx - touchStart.sx) / cam.zoom;
      const dy = (sy - touchStart.sy) / cam.zoom;
      cam.x = touchStart.camX - dx;
      cam.y = touchStart.camY - dy;
    } else if (drawMode === 'line') {
      const { x: wx, y: wy } = screenToWorld(sx, sy);
      hoveredStar = nearestWorldStar(wx, wy, myStars);
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  lastPinchDist = null;
  if (!touchStart) return;

  const boundingBox = canvas.getBoundingClientRect();
  const endX = e.changedTouches[0].clientX - boundingBox.left;
  const endY = e.changedTouches[0].clientY - boundingBox.top;
  const { sx, sy } = translateClientPos(endX, endY);
  const { x: wx, y: wy } = screenToWorld(sx, sy);

  if (drawMode === 'line') {
    const hit = nearestWorldStar(wx, wy, myStars);
    if (didPan) {
      if (dragStartStarIdx !== -1 && hit !== -1 && dragStartStarIdx !== hit) {
        const dup = myLines.some(([a, b]) => (a === dragStartStarIdx && b === hit) || (a === hit && b === dragStartStarIdx));
        if (!dup) {
          myLines.push([dragStartStarIdx, hit]);
          recordLineConnection();
          hasUnsavedChanges = true;
        }
      }
      lineStart = null;
    } else {
      if (hit !== -1) {
        if (lineStart === null) {
          lineStart = hit;
        } else if (lineStart === hit) {
          lineStart = null;
        } else {
          const dup = myLines.some(([a, b]) => (a === lineStart && b === hit) || (a === hit && b === lineStart));
          if (!dup) {
            myLines.push([lineStart, hit]);
            recordLineConnection();
            hasUnsavedChanges = true;
          }
          lineStart = null;
        }
      } else {
        lineStart = null;
      }
    }
    isPanning = false; touchStart = null; panStart = null; dragStartStarIdx = -1; didPan = false;
    return;
  }

  if (!didPan && Date.now() - touchStart.t < 300) handlePlace(sx, sy);

  touchStart = null; panStart = null; isPanning = false; didPan = false; dragStartStarIdx = -1;
}, { passive: false });

function handlePlace(sx, sy) {
  const { x: wx, y: wy } = screenToWorld(sx, sy);
  
  if (drawMode === 'star') {
    const existing = nearestWorldStar(wx, wy, myStars, 20);
    if (existing === -1) {
      myStars.push({ x: wx, y: wy, r: 2.5 + Math.random() * 1.5 });
      analyticsRegistry.sessionStarsPlaced++;
      analyticsRegistry.historicalTotalStarsPlaced++;
      updateSystemAnalytics();
      triggerMilestoneUnlock('first_star');
      if (analyticsRegistry.historicalTotalStarsPlaced >= 10) triggerMilestoneUnlock('star_cluster');
      if (analyticsRegistry.historicalTotalStarsPlaced >= 100) triggerMilestoneUnlock('galaxy_builder');
      if (analyticsRegistry.historicalTotalStarsPlaced >= 500) triggerMilestoneUnlock('cosmic_architect');
      updateCount();
      hasUnsavedChanges = true;
    }
  } else if (drawMode === 'erase') {
    const starHit = nearestWorldStar(wx, wy, myStars, 24);
    if (starHit !== -1) {
      myLines = myLines.filter(([a, b]) => a !== starHit && b !== starHit);
      myStars.splice(starHit, 1);
      myLines = myLines.map(([a, b]) => {
        const newA = a > starHit ? a - 1 : a;
        const newB = b > starHit ? b - 1 : b;
        return [newA, newB];
      });
      hoveredStar = null;
      updateCount();
      hasUnsavedChanges = true;
      triggerMilestoneUnlock('stellar_collapse');
      return;
    }
    
    const lineThreshPx = 12;
    const lineThresh = lineThreshPx / cam.zoom;
    let lineIdxToRemove = -1;
    let bestLineDist = Infinity;
    
    myLines.forEach(([a, b], idx) => {
      const sa = myStars[a];
      const sb = myStars[b];
      if (!sa || !sb) return;
      
      const dist = getLineDistance(wx, wy, sa, sb);
      if (dist < lineThresh && dist < bestLineDist) {
        bestLineDist = dist;
        lineIdxToRemove = idx;
      }
    });
    
    if (lineIdxToRemove !== -1) {
      myLines.splice(lineIdxToRemove, 1);
      updateCount();
      hasUnsavedChanges = true;
    }
  }
}

async function saveConstellation() {
  if (myStars.length === 0) { toast('place some stars first'); return; }
  
  const name = document.getElementById('ni').value.trim();
  if (!name) { toast('please name your constellation'); return; }
  
  if (saving) return;
  saving = true;

  const color = COLORS[constellations.length % COLORS.length];
  const record = { id: crypto.randomUUID(), name, color, stars: myStars, lines: myLines, canvas_w: 0, canvas_h: 0 };
  if(!isMultiplayerMode) {
    constellations.push(record);
    myStars = []; myLines = []; lineStart = null; dragStartStarIdx = -1;
    document.getElementById('ni').value = '';
    
    updateCount();
    triggerMilestoneUnlock('constellation_add');
    toast('"' + name + '" added');
    
    hasUnsavedChanges = true; 
    saving = false;
    return;
  }
  
  showSyncing(true);
  try {
    if (db) {
      const saved = await insertOne(record);
      constellations.push(saved);
      latestSeenAt = saved.created_at;
      updateCount();
    }
    myStars = []; myLines = []; lineStart = null; dragStartStarIdx = -1;
    document.getElementById('ni').value = '';
    triggerMilestoneUnlock('constellation_add');
    toast('"' + name + '" is now in the shared sky');
  } catch(e) { toast('save failed — check console'); console.error(e); }
  showSyncing(false);
  saving = false;
}

function clearCurrent() { 
  if (myStars.length === 0 && myLines.length === 0) {
    toast('nothing to clear');
    return;
  }
  
  if (confirm("Are you sure you want to clear your current unsaved stars and lines?")) {
    myStars = []; 
    myLines = []; 
    lineStart = null; 
    dragStartStarIdx = -1; 
    updateCount(); 
    hasUnsavedChanges = true;
    triggerMilestoneUnlock('void_state');
  }
}

function showSyncing(on) { document.getElementById('syncing').style.opacity = on ? '1' : '0'; }

function updateCount() {
  const total = constellations.reduce((n, c) => n + (c.stars ? c.stars.length : 0), 0) + myStars.length;
  document.getElementById('badge').textContent = total > 0 ? total + ' stars in view' : '';
}

function updateOnlineCount(n) {
  const el = document.getElementById('online-count');
  if (el) el.textContent = n === 1 ? '1 gazing' : n + ' gazing';
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.opacity = '0', 2600);
}

function resize() { 
  const isForcedLandscape = window.innerWidth <= 768 && window.innerHeight > window.innerWidth;
  if (isForcedLandscape) {
    W = canvas.width = window.innerHeight;
    H = canvas.height = window.innerWidth;
  } else {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
}
window.addEventListener('resize', resize);

function migrateConstellation(c) {
  if (!c.canvas_w || c.canvas_w === 0) return c;
  const offsetX = -c.canvas_w / 2;
  const offsetY = -c.canvas_h / 2;
  return {
    ...c,
    stars: (c.stars || []).map(s => ({ ...s, x: s.x + offsetX, y: s.y + offsetY })),
    canvas_w: 0, canvas_h: 0,
  };
}

document.getElementById('menu-new-sky').onclick = () => {
  const inputName = prompt("Name your sky:", "Custom Sky");
  if (inputName === null) return; 

  currentActiveSkyId = null;
  currentActiveSkyName = inputName.trim() === "" ? "Custom Sky" : inputName;
  myStars = [];
  myLines = [];
  constellations = [];
  cam.x = 0; cam.y = 0; cam.zoom = 1;
  launchSystemHorizonView(false);
};

document.getElementById('menu-load-sky').onclick = () => {
  processLocalDatabaseRender();
  toggleOverlay('load', true);
};

document.getElementById('io-import-btn').onclick = () => {
  document.getElementById('import-file-input').click();
};

document.getElementById('import-file-input').onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const parsed = JSON.parse(event.target.result);
      if(parsed.formatId === "sharedsky_matrix_export" || parsed.stars) {
        myStars = parsed.stars || [];
        myLines = parsed.lines || [];
        constellations = parsed.constellations || [];
        currentActiveSkyName = parsed.name || "Imported Sky";
        currentActiveSkyId = Date.now().toString();
        toggleOverlay('load', false);
        launchSystemHorizonView(false);
        toast("Vector coordinates mapped successfully");
        triggerMilestoneUnlock('data_reception');
      } else {
        alert("JSON object properties mismatch target mapping scheme.");
      }
    } catch(err) { alert("Corrupted or broken JSON structure."); }
  };
  reader.readAsText(file);
};

document.getElementById('menu-enter-mp').onclick = () => {
  launchSystemHorizonView(true);
};

document.getElementById('btn-exit-canvas').onclick = () => {
  if (!isMultiplayerMode && hasUnsavedChanges) {
    const doSave = confirm("You have unsaved changes! Click OK to Save and Exit, or Cancel to exit without saving.");
    if (doSave) {
      saveHorizonToLocalStorage(currentActiveSkyName);
    }
  }
  terminateSystemHorizonView();
};

document.getElementById('menu-open-ach').onclick = () => {
  let unlocked = [];
  try {
    const parsed = localStorage.getItem(ACHIEVEMENT_STORAGE_KEY);
    if(parsed) unlocked = JSON.parse(parsed);
  } catch(e) {}
  
  document.getElementById('ach-progress').textContent = `${unlocked.length} / ${MILESTONE_REGISTRY.length} Unlocked`;
  const view = document.getElementById('ach-list');
  view.innerHTML = "";
  
  MILESTONE_REGISTRY.forEach(m => {
    const hasBeenUnlocked = unlocked.includes(m.id);
    const element = document.createElement('div');
    element.className = `ach-item ${hasBeenUnlocked ? 'unlocked' : 'locked'}`;
    element.innerHTML = `
      <div class="ach-icon">${hasBeenUnlocked ? '🌟' : '🔒'}</div>
      <div>
        <div class="ach-name">${m.name}</div>
        <div class="ach-desc">${m.desc}</div>
      </div>
    `;
    view.appendChild(element);
  });
  toggleOverlay('achievements', true);
};

document.getElementById('menu-open-stats').onclick = () => {
  const target = document.getElementById('stats-content');
  const savesCount = getLocalSaves().length;
  target.innerHTML = `
    <div class="stat-row"><span class="stat-label">Total Stars</span><span class="stat-value">${analyticsRegistry.historicalTotalStarsPlaced}</span></div>
    <div class="stat-row"><span class="stat-label">Total Lines</span><span class="stat-value">${analyticsRegistry.historicalTotalLinesDrawn}</span></div>
    <div class="stat-row"><span class="stat-label">Saved Skies</span><span class="stat-value">${savesCount}</span></div>
  `;
  toggleOverlay('stats', true);
};

document.getElementById('close-load').onclick = () => toggleOverlay('load', false);
document.getElementById('close-ach').onclick = () => toggleOverlay('achievements', false);
document.getElementById('close-stats').onclick = () => toggleOverlay('stats', false);

window.setDrawMode = setDrawMode;
window.saveConstellation = saveConstellation;
window.clearCurrent = clearCurrent;
window.triggerSystemJSONExport = triggerSystemJSONExport;
window.forceSaveSky = saveHorizonToLocalStorage; 

function init() {
  resize();
  
  try {
    const store = localStorage.getItem(ACHIEVEMENT_STORAGE_KEY);
    if (store) JSON.parse(store).forEach(id => unlockedSessionCache.add(id));
  } catch(e) {}

  loadSystemAnalytics();
  constructMenuStarfield();
  processMenuStarfieldLoop();
  
  if(db) {
    pollForNew();
  }
}

init();
</script>
